<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>S2 | PRIVATE MONITOR</title>
    <!-- Подключаем библиотеку для связи -->
    <script src="https://unpkg.com"></script>
    <style>
        body { background: #0d0d0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { width: 250px; padding: 30px; border: 2px solid #ff8c00; border-radius: 15px; text-align: center; cursor: pointer; background: rgba(255,140,0,0.05); }
        .admin-box { margin-top: 20px; display: flex; gap: 10px; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #333; background: #000; color: #ff8c00; width: 80px; text-align: center; }
        button { padding: 10px 20px; background: #ff8c00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #view { display: none; position: fixed; inset: 0; background: #000; z-index: 100; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <!-- КНОПКА ДЛЯ ТОГО, КТО ТРАНСЛИРУЕТ -->
    <div class="card" onclick="startShare()">
        <div style="font-size: 40px;">📡</div>
        <b>ВКЛЮЧИТЬ ТРАНСЛЯЦИЮ</b>
        <div id="status" style="font-size: 10px; margin-top: 10px; color: #666;">Ожидание...</div>
    </div>

    <!-- ПОЛЕ ДЛЯ ТОГО, КТО СМОТРИТ -->
    <div class="admin-box">
        <input type="text" id="code" placeholder="КОД">
        <button onclick="watch()">СМОТРЕТЬ</button>
    </div>

    <div id="view">
        <button onclick="location.reload()" style="position:absolute; top:20px; right:20px; z-index:200;">ЗАКРЫТЬ</button>
        <video id="remote-video" autoplay playsinline></video>
    </div>

    <script>
        // Это уникальный адрес для связки. В реальном проекте его лучше менять.
        const PEER_ID = 'standoff-secret-66778'; 
        const peer = new Peer(PEER_ID); 

        peer.on('open', () => {
            document.getElementById('status').innerText = "Готов к подключению";
        });

        // 1. ФУНКЦИЯ ДЛЯ ТРАНСЛЯЦИИ (Нажимает тот, кого смотрим)
        async function startShare() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                document.getElementById('status').innerText = "ТРАНСЛЯЦИЯ ИДЕТ...";
                document.getElementById('status').style.color = "#00ff00";

                // Ждем пока админ "позвонит"
                peer.on('call', (call) => {
                    call.answer(stream); 
                });
            } catch (e) {
                alert("Ошибка: Браузер запретил захват экрана. Нужен HTTPS!");
            }
        }

        // 2. ФУНКЦИЯ ДЛЯ ПРОСМОТРА (Нажимаешь ты)
        function watch() {
            const val = document.getElementById('code').value;
            if(val !== "66778") return alert("Неверный код!");

            // Создаем отдельное соединение для просмотра
            const viewer = new Peer();
            viewer.on('open', () => {
                const call = viewer.call(PEER_ID, new MediaStream());
                
                call.on('stream', (remoteStream) => {
                    document.getElementById('view').style.display = 'block';
                    document.getElementById('remote-video').srcObject = remoteStream;
                });
            });
        }
    </script>
</body>
</html>
